# https://docs.endorlabs.com/scan/scan-profiles/configure-scanprofile-yaml
# Only the app venv should use root requirements.txt. Extra pip-style corpora (sca-corpus/, docker/sca-legacy)
# are not additional pip lockfiles; without this, some scans merge all *.txt manifests and fail to build a venv.
kind: "AutomatedScanParameters"
spec:
  languages:
    - python
  call_graph_languages:
    - python
  additional_environment_variables:
    - "ENDOR_SCAN_PYTHON_REQUIREMENTS=requirements.txt"
