# RESEARCH: auth-only replica of the same image (second workload for supply-chain / DAST).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: vulnerable-bookstore-research
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth
          image: vulnerable-bookstore:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "run_auth"]
          ports:
            - name: http
              containerPort: 5001
          env:
            - name: AUTH_SERVICE_MODE
              value: "1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bookstore-app-secrets
                  key: DATABASE_URL
            - name: BOOKSTORE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bookstore-app-secrets
                  key: BOOKSTORE_SECRET_KEY
            - name: FLASK_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: bookstore-flags
                  key: FLASK_DEBUG
            - name: PORT
              value: "5001"
            - name: BIND_ALL
              valueFrom:
                configMapKeyRef:
                  name: bookstore-flags
                  key: BIND_ALL
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
