# Storefront + back-office API in one local container.
# SQLite lives in the named volume at /data; JSON import files stay mounted read-only from ./data.
# -----------------------------------------------------------------------------

services:
  bookstore-app:
    build: .
    image: stack-and-spine:local
    user: "0:0"
    ports:
      - "127.0.0.1:3333:3333"
    volumes:
      - ./data:/app/data:ro
      - app_state:/data
    environment:
      - INVENTORY_DB_PATH=/data/inventory.db
      - BOOKSTORE_SECRET_KEY=compromised-in-compose-file
      - API_KEY_CART=sk_live_51N9UxFakeLocalPartnerKeyDontUse
      - API_KEY_SVC_RESEARCH=ghp_5QwFakeLocalIntegrationToken1234567890
      - AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
      - AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      - ALLOW_EXPOSED_USERS=1
      - FLASK_DEBUG=1
      - PORT=3333
      - BIND_ALL=1
    ulimits:
      nproc: 1048576
    security_opt:
      - seccomp:unconfined
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    extra_hosts:
      - "demo.corp-scanner.evil:192.0.2.1"
    read_only: false

volumes:
  app_state: {}
