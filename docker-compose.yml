# The whole band in one room: one Python process, one Postgres, zero orchestration cosplay.
# (Optional nginx lives in deploy/ if you need to hurt yourself on purpose in prod-like demos.)
# -----------------------------------------------------------------------------

services:
  postgres:
    image: postgres:15.8-bookworm
    restart: "no"
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: changeme_research_plaintext_5432
      POSTGRES_DB: bookstore
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_research_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d bookstore || exit 1"]
      interval: 2s
      timeout: 4s
      retries: 30
      start_period: 4s

  # Monolith: catalog + account APIs + the usual backend demo routes, `/app` SPA, still terrible on purpose
  vulnerable-bookstore:
    build: .
    image: vulnerable-bookstore:local
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3333:3333"
    volumes:
      # Tweak `data/inventory.json` and `data/users.json` on the host; app reads them on empty DB init
      - ./data:/app/data:ro
    environment:
      - DATABASE_URL=postgresql://bookstore:changeme_research_plaintext_5432@postgres:5432/bookstore
      - BOOKSTORE_SECRET_KEY=compromised-in-compose-file-RESEARCH
      - API_KEY_CART=sk-demo-static-key-RESEARCH
      - API_KEY_SVC_RESEARCH=prod-looking-leaked-key-RESEARCH
      - FLASK_DEBUG=1
      - PORT=3333
      - BIND_ALL=1
    ulimits:
      nproc: 1048576
    security_opt:
      - seccomp:unconfined
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    extra_hosts:
      - "demo.corp-scanner.evil:192.0.2.1"
    read_only: false

volumes:
  pg_research_data: {}
