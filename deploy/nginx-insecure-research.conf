# RESEARCH: minimal reverse proxy in front of the monolith (extra service / manifest / attack surface for benchmarks).
# Does not split /api/auth to a second backend by default; use the auth container port directly for that story.

server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    location / {
        proxy_pass http://vulnerable-bookstore:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
